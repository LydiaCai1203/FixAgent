services:
  postgres:
    image: postgres:17
    container_name: fixagent-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: fixagent
      POSTGRES_USER: fixagent
      POSTGRES_PASSWORD: fixagent
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./ops/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
      - ./ops/postgres/sync-schema.sh:/docker-entrypoint-initdb.d/sync-schema.sh:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fixagent -d fixagent"]
      interval: 10s
      timeout: 5s
      retries: 5

  orchestrator:
    build:
      context: .
      dockerfile: Orchestrator/Dockerfile
    container_name: fixagent-orchestrator
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://fixagent:fixagent@postgres:5432/fixagent
      RUST_LOG: info
    ports:
      - "3000:3000"
    volumes:
      - ./orchestrator.toml:/etc/fixagent/orchestrator.toml:ro
    command: ["/usr/local/bin/orchestrator", "serve-http"]

  web:
    build:
      context: .
      dockerfile: web/Dockerfile
    container_name: fixagent-web
    restart: unless-stopped
    depends_on:
      - orchestrator
    ports:
      - "5173:5173"

volumes:
  postgres-data:
