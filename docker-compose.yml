services:
  postgres:
    image: postgres:17
    container_name: fixagent-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: fixagent
      POSTGRES_USER: fixagent
      POSTGRES_PASSWORD: fixagent
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./ops/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fixagent -d fixagent"]
      interval: 10s
      timeout: 5s
      retries: 5

  orchestrator:
    build:
      context: .
      dockerfile: Orchestrator/Dockerfile
    container_name: fixagent-orchestrator
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://fixagent:fixagent@postgres:5432/fixagent
      RUST_LOG: info
    ports:
      - "3000:3000"
    command: ["/usr/local/bin/orchestrator", "serve-http", "--host", "0.0.0.0", "--port", "3000"]

  web:
    image: node:22-bookworm
    container_name: fixagent-web
    restart: unless-stopped
    working_dir: /app
    depends_on:
      - orchestrator
    ports:
      - "5173:5173"
    volumes:
      - ./web:/app
    command: ["sh", "-lc", "npm install && npm run dev -- --host 0.0.0.0 --port 5173"]

volumes:
  postgres-data:
